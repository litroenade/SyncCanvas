# SyncCanvas 配置文件示例
# 复制此文件为 config.toml 并填写实际配置

version = "1.0.0"

[security]
# JWT 签名密钥，生产环境请使用随机字符串
secret_key = "your-secret-key-please-change-in-production"
# 管理员密钥
admin_key = "admin"

[server]
host = "0.0.0.0"
port = 8000
# 允许的跨域来源，["*"] 表示允许所有
allowed_origins = ["*"]

[database]
# SQLite 数据库路径
url = "sqlite:///./data/sync_canvas.db"
# 是否打印 SQL 语句 (调试用)
echo = false

[ai]
# 主要 AI 提供商
provider = "siliconflow"
model = "Qwen/Qwen2.5-14B-Instruct"
base_url = "https://api.siliconflow.cn/v1"
api_key = ""

# 备用提供商 (OpenAI 兼容)
fallback_provider = "openai"
fallback_model = "gpt-4o-mini"
fallback_base_url = "https://api.openai.com/v1"
fallback_api_key = ""

# 工具调用策略: auto/none/required
tool_choice = "auto"
# 单次请求最大工具调用次数
max_tool_calls = 10

[logging]
# 日志级别: DEBUG/INFO/WARNING/ERROR
level = "INFO"
# 是否启用颜色输出
colorize = true
# 是否显示时间
show_time = true
# 日志文件路径 (可选，不填则只输出到控制台)
# file = "./logs/app.log"
